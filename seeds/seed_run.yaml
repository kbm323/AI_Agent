goal: >-
  Build a Hermes-first multi-agent meeting system that simulates an AI virtual
  entertainment company. Discord-based meeting initiation with 6-7 persistent
  team-leader personas, 29 specialized roles across 6 teams, per-role multi-model
  LLM workers executed via opencode-go CLI, structured context-packet-based round
  progression, GLM-5.1 primary plus Codex GPT-5.5 conditional dual validation,
  OpenClaw tool-use execution with human-in-the-loop for high-risk actions,
  priority-queue concurrent meeting handling, crash-resilient manifest-based state
  recovery, and 4-layer knowledge accumulation across meetings.

task_type: code

constraints:
  - "Hermes Core modification minimized"
  - "opencode-go CLI for all per-role model-diverse worker execution"
  - "All Coordinator-Worker contracts use filesystem-based JSON I/O"
  - "Maximum 3 meeting rounds plus 1 tie-break round"
  - "Maximum 2 concurrent meetings, 4 concurrent opencode-go calls, 7 agents per meeting"
  - "Context packet token limits: normal worker 12k, validator 20k, Codex 30k"
  - "GLM-5.1 primary validator, Codex GPT-5.5 conditional secondary"
  - "All state transitions persist to manifest.json before external calls"
  - "Discord single-interface: Coordinator sole user-facing channel"
  - "Silent fail forbidden: all failures logged to manifest"
  - "meeting_id-based complete directory isolation"
  - "Append-only immutable records for meetings, decisions, sources"
  - "Meta-cognition proposals require human approval"
  - "Rate limit detection: Before any LLM call, check opencode-go quota. If below 10 percent remaining, pause execution with state saved"
  - "Rate limit backoff: On 429 or quota-exceeded error, wait 60s and retry once. If still failing, save state and exit with exit condition rate_limit_paused"
  - "Maximum 15 concurrent sub-ACs per Deliver phase to stay within rate limits"
  - "Execution is resumable from manifest after rate-limit pause — completed sub-ACs skip on resume"
  - "All LLM-calling sub-ACs must trap rate-limit errors and surface them to the orchestrator as non-fatal, resumable events"

acceptance_criteria:
  - "Users initiate meetings via Discord slash command or bot mention"
  - "Qwen LLM primary router classifies meeting topics with agenda_type, tags, risk_tags, required_roles, optional_roles, validator_required, codex_required"
  - "Static routing_rules.yaml serves as fallback/guardrail only"
  - "Full lifecycle state machine from created through completed with exception states"
  - "Round 1 independent opinion packets, Round 2 conflict-resolution, Round 3 convergence, Tie-break deadlock"
  - "Internal validation evaluates 5 areas with 5-level verdict (pass/conditional_pass/revision_required/escalate/fail)"
  - "GLM-5.1 default validator, Codex GPT-5.5 escalates on 7 defined triggers"
  - "Codex dual-validation resolves conflicts by domain (tech/security/data vs legal/budget/brand vs factual)"
  - "P0-P1-P2-P3 priority queue with FIFO within same priority, max 2 concurrent meetings"
  - "P0 meetings may pause lower-priority meetings, resume from manifest.completed_step"
  - "Cancel command cancels meeting with cancelled state, output preserved"
  - "Worker failures follow retry, fallback, quorum reassessment, escalation/fail sequence"
  - "Required roles must complete with retry and fallback, optional roles may skip with degradation"
  - "Coordinator crash recovery resumes from manifest.json completed_step"
  - "OpenClaw executes tool-use actions via REST/API/MCP primary with file-based JSON queue fallback"
  - "OpenClaw short tasks 30s or less execute synchronously, long tasks over 30s execute asynchronously"
  - "OpenClaw high-risk actions require human-in-the-loop approval before execution"
  - "OpenClaw supports cancel-only intervention, semantic retune equals cancel plus new execution_id"
  - "4-layer knowledge system: L0 Google Drive, L1 Obsidian vault, L2 context-mode FTS5, L3 Coordinator dynamic retrieval"
  - "Coordinator dynamically retrieves relevant past knowledge per meeting, not blanket injection"
  - "Meeting records and decision logs are append-only, superseded decisions use metadata"
  - "Coordinator generates periodic summaries (Weekly, Monthly, Quarterly) and Self-Reflection Reports"
  - "Agent persona specs use agent.yaml plus persona.md in agents per team per role_id with Git versioning"
  - "6-7 persistent team-leader Discord bots, internal specialists exist as opencode-go workers only"
  - "Meeting responses delivered in original Discord thread, summary cross-posted to results or briefing channels"
  - "Same-thread follow-up questions extend existing meeting_id"

evaluation_principles:
  - name: requirements_fit
    weight: 0.25
    description: "Degree to which meeting output addresses original user agenda and all constraints"
  - name: logical_consistency
    weight: 0.2
    description: "Internal coherence across all role opinions within and across rounds"
  - name: factual_grounding
    weight: 0.2
    description: "Accuracy of factual claims, data citations, and external references"
  - name: feasibility
    weight: 0.15
    description: "Practical implementability of proposed solutions"
  - name: risk_policy
    weight: 0.2
    description: "Completeness of risk identification, severity assessment, and mitigation strategies"

exit_conditions:
  - name: consensus_reached
    description: "All required roles agree and validation passes with overall_score at least 0.85 and no high-risk"
    criteria: "state transitions to completed"
  - name: conditional_pass_accepted
    description: "Validation returns conditional_pass and Coordinator applies fixes and re-validates successfully"
    criteria: "state transitions to completed"
  - name: deadlock_unresolvable
    description: "Consensus impossible after 3 plus 1 rounds and chair or Codex cannot resolve"
    criteria: "escalation triggered based on domain"
  - name: validation_failed_irrecoverable
    description: "Validation fails beyond repair cycles: max 2 validations, 1 re-meeting, 1 Codex check"
    criteria: "state transitions to failed or escalated"
  - name: user_cancelled
    description: "User issues cancel command from Discord"
    criteria: "state transitions to cancelled, outputs preserved on disk"
  - name: resource_exhausted
    description: "System resources depleted beyond degradation threshold"
    criteria: "state transitions to failed with partial results"
  - name: coordinator_crash_unrecoverable
    description: "Meeting manifest corrupted beyond parsing or raw_outputs completely lost"
    criteria: "state transitions to failed with user notification"
  - name: rate_limit_paused
    description: "Rate limit detected below 10 percent or 429 received after retry. State saved to manifest."
    criteria: "state transitions to paused, resumable from manifest after quota reset"

