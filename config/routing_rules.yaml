# ═════════════════════════════════════════════════════════════════════════════
# RISK DETECTION — Guardrail patterns that trigger risk_tags
# ═════════════════════════════════════════════════════════════════════════════
#
# These patterns run on ALL user input regardless of Qwen classification.
# If any pattern matches, the risk_tag is ADDED to the routing output.
# This ensures no risk slips through even when Qwen misses it.

risk_detection:
  patterns:
    - risk_tag: security_risk
      severity: high
      keywords:
        - 보안
        - security
        - 해킹
        - hack
        - 취약점
        - vulnerability
        - 인증우회
        - bypass
        - 침투
        - exploit
      auto_codex: true   # security always triggers Codex

    - risk_tag: data_loss_risk
      severity: high
      keywords:
        - 데이터손실
        - data_loss
        - 삭제
        - delete
        - 마이그레이션
        - migration
        - 데이터베이스변경
        - schema_change
      auto_codex: true
      requires_approval: true   # human-in-the-loop required

    - risk_tag: budget_financial
      severity: medium
      keywords:
        - 예산
        - budget
        - 비용
        - cost
        - 달러
        - 원
        - 견적
        - 투자
        - investment
        - 지출
        - expense
      auto_codex: true

    - risk_tag: legal_exposure
      severity: high
      keywords:
        - 법률
        - legal
        - 저작권
        - copyright
        - 소송
        - sue
        - 라이선스위반
        - license_violation
        - 계약위반
        - breach_of_contract
      auto_codex: true
      requires_approval: true

    - risk_tag: copyright_risk
      severity: high
      keywords:
        - 저작권
        - copyright
        - 표절
        - plagiarism
        - 무단사용
        - unauthorized_use
        - 라이선스
        - license
      auto_codex: true
      requires_approval: true

    - risk_tag: regulatory_risk
      severity: high
      keywords:
        - 규제
        - regulation
        - 개인정보보호법
        - gdpr
        - ccpa
        - 컴플라이언스
        - compliance
      auto_codex: true

    - risk_tag: external_publication
      severity: medium
      keywords:
        - 공개
        - release
        - 런칭
        - launch
        - 출시
        - publish
        - 외부발표
        - public_announcement
        - 프레스
        - press
      auto_codex: true

    - risk_tag: brand_reputation
      severity: medium
      keywords:
        - 브랜드이미지
        - brand_image
        - 평판
        - reputation
        - 논란
        - controversy
        - 악플
        - backlash
      auto_codex: true

    - risk_tag: code_change
      severity: low
      keywords:
        - 코드변경
        - code_change
        - 리팩토링
        - refactoring
        - 배포
        - deploy
        - pr
        - pull_request
      auto_codex: false   # conditional — only if combined with other risks

    - risk_tag: automation_risk
      severity: medium
      keywords:
        - 자동화
        - automation
        - 자동배포
        - auto_deploy
        - cron
        - 스크립트
        - script
      auto_codex: false

    - risk_tag: data_risk
      severity: medium
      keywords:
        - 데이터처리
        - data_processing
        - 데이터파이프라인
        - data_pipeline
        - 데이터셋
        - dataset
        - 학습데이터
        - training_data
        - 데이터품질
        - data_quality
      auto_codex: false
      note: "Moderate data risk — not data loss. Covers data processing, pipeline issues, dataset quality."

    - risk_tag: schedule_critical
      severity: medium
      keywords:
        - 데드라인
        - deadline
        - 긴급
        - urgent
        - 기한임박
        - due_soon
        - 지연
        - delayed
        - 마감
      auto_codex: true

    - risk_tag: irreversible_action
      severity: high
      keywords:
        - 복구불가
        - irreversible
        - 되돌릴수없
        - 영구삭제
        - permanent_delete
        - 덮어쓰기
        - overwrite
      auto_codex: true
      requires_approval: true

    - risk_tag: consensus_unstable
      severity: medium
      keywords:
        - 의견충돌
        - disagreement
        - 합의불가
        - no_consensus
        - 이견
        - dissent
        - 반대
        - oppose
      auto_codex: true

    - risk_tag: latest_info_dependent
      severity: low
      keywords:
        - 최신정보
        - latest
        - 실시간
        - realtime
        - 현재
        - current
        - 오늘
        - today
      auto_codex: true

# ═════════════════════════════════════════════════════════════════════════════
# CODEX ESCALATION RULES — 7 defined triggers
# ═════════════════════════════════════════════════════════════════════════════
#
# These are the 7 defined Codex GPT-5.5 escalation triggers as specified in
# the system design (Track 4: Validation Layer). When any trigger fires,
# codex_required is forced to true in the routing output.

escalation_rules:
  codex_triggers:
    - id: trigger-budget-schedule
      trigger_number: 1
      description: "Budget/schedule related items"
      condition:
        any_risk_tag_in:
          - budget_financial
          - schedule_critical
      action: set_codex_required_true

    - id: trigger-legal-copyright
      trigger_number: 2
      description: "Legal/copyright related items"
      condition:
        any_risk_tag_in:
          - legal_exposure
          - copyright_risk
          - regulatory_risk
      action: set_codex_required_true

    - id: trigger-external-publication
      trigger_number: 3
      description: "External publication/brand direction"
      condition:
        any_risk_tag_in:
          - external_publication
          - brand_reputation
      action: set_codex_required_true

    - id: trigger-code-security-data
      trigger_number: 4
      description: "Code/automation/security/data loss risk"
      condition:
        any_risk_tag_in:
          - security_risk
          - data_loss_risk
          - code_change
          - automation_risk
          - irreversible_action
      action: set_codex_required_true

    - id: trigger-consensus-unstable
      trigger_number: 5
      description: "Unstable consensus in meeting"
      condition:
        any_risk_tag_in:
          - consensus_unstable
      action: set_codex_required_true

    - id: trigger-latest-info
      trigger_number: 6
      description: "Latest-information-dependent items"
      condition:
        any_risk_tag_in:
          - latest_info_dependent
      action: set_codex_required_true

    - id: trigger-glm-verdict
      trigger_number: 7
      description: "GLM returns non-pass verdict, confidence below threshold (0.75), or escalation recommendation"
      condition:
        runtime: true   # cannot determine from static rules — set by runtime
      action: set_codex_required_true
      note: "This trigger can only be evaluated at validation runtime, not from static rules."

  # ── Conflict Resolution (GLM vs Codex) ─────────────────────────────────
  conflict_resolution:
    tech_security_data:
      priority: codex
      description: "Technical judgment, security assessment, data risk → Codex priority"
    legal_budget_brand:
      priority: user_escalation
      description: "Legal, budget, brand, external matters → User escalation"
    factual:
      priority: re_search_then_re_validate
      description: "Factual disagreements → Re-search and re-validate"
    code_automation:
      priority: codex
      description: "Code and automation decisions → Codex priority"
    irreversible:
      priority: user_escalation
      description: "Data loss, operational change, irreversible actions → User escalation"

# ═════════════════════════════════════════════════════════════════════════════
# PRIORITY INFERENCE RULES — Qwen failure fallback
# ═════════════════════════════════════════════════════════════════════════════
#
# When Qwen cannot determine meeting priority, these keyword rules take over.
# Priority order: P0 > P1 > P2 > P3. First matching priority wins.

priority_rules:
  inference:
    - priority: P0
      label: "긴급/중대사항"
      keywords:
        - 긴급
        - urgent
        - 보안사고
        - security_incident
        - 데이터유출
        - data_breach
        - 장애
        - outage
        - 중단
        - down
        - 심각
        - critical
        - 즉시
        - immediately
        - asap
      description: "Incident response, data loss, security, urgent fixes"

    - priority: P1
      label: "중요"
      keywords:
        - 중요
        - important
        - 법률
        - legal
        - 예산
        - budget
        - 외부공개
        - launch
        - 계약
        - contract
        - 데드라인
        - deadline
      description: "In-progress project decisions, legal, budget, external publication"

    - priority: P2
      label: "일반"
      keywords:
        - 개발
        - development
        - 제작
        - production
        - 마케팅
        - marketing
        - 디자인
        - design
        - 검토
        - review
        - 자동화
        - automation
      description: "General production, automation, development"

    - priority: P3
      label: "아이디어/브레인스토밍"
      keywords:
        - 아이디어
        - idea
        - 브레인스토밍
        - brainstorm
        - 제안
        - suggestion
        - 탐색
        - exploration
        - 가능성
        - feasibility
      description: "Ideas, brainstorming, exploration"

  # Default when no keywords match
  default: P2

# ═════════════════════════════════════════════════════════════════════════════
# GUARDRAILS — Hard constraints overriding even Qwen output
# ═════════════════════════════════════════════════════════════════════════════
#
# These are NON-NEGOTIABLE system invariants. Even if Qwen returns different
# values, the guardrail logic MUST enforce these constraints before the
# routing result is committed.

guardrails:
  # ── Role Limits ──
  - id: max_roles_per_meeting
    description: "Maximum 7 agents per meeting (including validator)"
    rule: "len(required_roles) + len(optional_roles) <= 7"
    enforcement: truncate_optional_roles_by_expertise_match

  - id: max_required_roles
    description: "Maximum 6 required roles per meeting"
    rule: "len(required_roles) <= 6"
    enforcement: demote_lowest_priority_required_to_optional

  - id: validator_always_required
    description: "Validator role is ALWAYS required (GLM-5.1 or fallback)"
    rule: "'validator' in required_roles"
    enforcement: force_add_validator

  - id: team_leader_quorum
    description: >
      At least 2 team leaders must be in required_roles or optional_roles
      for cross-functional meetings (non-single-team meetings).
    rule: >
      if len(involved_teams) >= 2: count_team_leaders(required + optional) >= 2
    enforcement: promote_team_leader_to_optional

  # ── Codex Escalation Guardrails ──
  - id: security_always_codex
    description: "Any meeting tagged security_risk MUST have codex_required=true"
    rule: "if 'security_risk' in risk_tags: codex_required = true"
    enforcement: force_codex_true

  - id: data_loss_always_codex
    description: "Any meeting tagged data_loss_risk MUST have codex_required=true"
    rule: "if 'data_loss_risk' in risk_tags: codex_required = true"
    enforcement: force_codex_true

  - id: legal_always_codex
    description: "Any meeting tagged legal_exposure or copyright_risk MUST have codex_required=true"
    rule: "if any(tag in risk_tags for tag in ['legal_exposure', 'copyright_risk', 'regulatory_risk']): codex_required = true"
    enforcement: force_codex_true

  - id: external_publication_codex
    description: "External publication/brand meetings MUST have codex_required=true"
    rule: "if 'external_publication' in risk_tags: codex_required = true"
    enforcement: force_codex_true

  # ── Meeting Constraints ──
  - id: max_rounds_absolute
    description: "Maximum 3 meeting rounds + 1 tie-break, no exceptions"
    rule: "round_count <= 4"
    enforcement: force_escalation_after_4_rounds

  - id: max_concurrent_meetings
    description: "Maximum 2 concurrent meetings"
    rule: "active_meetings <= 2"
    enforcement: queue_or_reject

  - id: max_concurrent_opencode_calls
    description: "Maximum 4 concurrent opencode-go CLI calls"
    rule: "active_opencode_calls <= 4"
    enforcement: queue_or_degrade

  # ── Silent Fail Prevention ──
  - id: no_silent_fail
    description: "All failures, fallbacks, and degradations MUST be logged to manifest"
    rule: "error_log must contain all failure events"
    enforcement: reject_manifest_without_error_log

  - id: required_role_no_silent_skip
    description: "Required roles cannot be silently skipped"
    rule: "if required_role fails: manifest must record retry_count, fallback_used, final_status"
    enforcement: validate_manifest_completeness

  # ── Isolation ──
  - id: meeting_directory_isolation
    description: "Every meeting MUST have a unique meetings/{meeting_id}/ directory"
    rule: "meeting_id maps 1:1 to filesystem directory"
    enforcement: create_or_verify_directory

  # ── Model Constraints ──
  - id: validator_is_glm
    description: "Validator MUST use GLM-5.1 (or GLM-4 fallback). Never Qwen or DeepSeek."
    rule: "validator.model.provider in ['glm-5.1', 'glm-4']"
    enforcement: force_glm_for_validator

  - id: no_same_model_revalidation
    description: "Never use the same model for re-validation. Dual validation = GLM + Codex, never GLM + GLM."
    rule: "if validation_attempt > 1: validator_model != previous_validator_model"
    enforcement: force_codex_on_second_validation

# ═════════════════════════════════════════════════════════════════════════════
# KEYWORD MATCHING ALGORITHM
# ═════════════════════════════════════════════════════════════════════════════

matching_algorithm:
  description: >
    How keyword matching works for agenda_type classification when Qwen fails.
  steps:
    - "1. Normalize input: lowercase, strip punctuation, split into tokens"
    - "2. For each agenda_type (in order), check each keyword group"
    - "3. A keyword group matches if ANY keyword in the group is found in input"
    - "4. An agenda_type matches if ALL its keyword groups match"
    - "5. First matching agenda_type wins (order is significant)"
    - "6. If no agenda_type matches, use 'general-discussion' as catch-all"
    - "7. After classification: run risk_detection patterns"
    - "8. Apply escalation_rules to determine codex_required"
    - "9. Apply guardrails as hard overrides"
    - "10. Return final routing result"
  language_support:
    - korean
    - english
    - mixed (korean + english terms in same input)
  note: >
    Keyword groups use OR logic internally (any keyword in group matches).
    Agenda type requires ALL keyword groups to match (AND logic between groups).
    This allows matching "뮤직비디오 제작" (matches both ["뮤직비디오"] and ["제작"] groups).

# ── Routing Output Schema (must match Qwen output format) ─────────────────
output_schema:
  description: >
    The exact JSON structure returned by this fallback router.
    Must be identical to Qwen LLM output format so consumers
    (Coordinator, meeting loop) do not need fallback-specific parsing.
  fields:
    agenda_type: string        # e.g., "creative-production"
    agenda_label: string       # e.g., "창작 제작 회의"
    tags: array<string>        # e.g., ["creative_production", "content_creation"]
    risk_tags: array<string>   # e.g., ["budget_financial"]
    required_roles: array<string>  # role_id list
    optional_roles: array<string>  # role_id list
    validator_required: boolean
    codex_required: boolean
    priority: string           # P0 | P1 | P2 | P3
    routing_source: "static_fallback"  # always this value when fallback active
    routing_reason: string     # e.g., "qwen_timeout" or "qwen_parse_failure"
    confidence: number         # static fallback confidence is always 0.7
    generated_at: string       # ISO 8601 timestamp
    version: "1.0.0"
