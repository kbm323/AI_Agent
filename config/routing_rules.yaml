# =============================================================================
# routing_rules.yaml — Static Fallback / Guardrail Routing Rules
# =============================================================================
#
# ROLE: Fallback and guardrail ONLY. The primary router is Qwen LLM (via
# opencode-go CLI). This file is activated ONLY when:
#   - Qwen LLM is unavailable (timeout, error, rate-limit)
#   - Qwen response fails JSON schema validation
#   - Network partition prevents opencode-go CLI execution
#
# GUARDRAIL: Certain rules in this file OVERRIDE even Qwen output as hard
# safety constraints (see `guardrails` section). These are non-negotiable
# system invariants.
#
# OUTPUT: When activated, this file must produce the same structured output
# as Qwen: agenda_type, tags, risk_tags, required_roles, optional_roles,
# validator_required, codex_required.
#
# CONVENTIONS:
#   - role_id: kebab-case
#   - team: kebab-case
#   - agenda_type: kebab-case
#   - tags / risk_tags: snake_case, lowercase
#
# Version: 1.0.0
# Generated: 2026-06-10
# Source: interview_20260610_070847 → seed_08605bf07c22
# =============================================================================

version: "1.0.0"

# ── Metadata ────────────────────────────────────────────────────────────────
metadata:
  description: >
    Static fallback routing rules for the AI Virtual Entertainment Company
    multi-agent meeting system. NOT the primary router. Activated only when
    Qwen LLM classification fails. Also serves as guardrail for hard safety
    constraints that override even Qwen output.
  activated_when:
    - qwen_timeout             # Qwen API call exceeds timeout
    - qwen_error               # Qwen returns error or non-200
    - qwen_parse_failure       # Qwen response fails JSON schema validation
    - qwen_rate_limited        # Qwen API rate limit hit
    - opencode_go_unavailable  # opencode-go CLI cannot execute
  primary_router: qwen-llm-via-opencode-go
  fallback_mode: keyword_based_classification

# ── Defaults ────────────────────────────────────────────────────────────────
defaults:
  validator_required: true
  validator_role_id: validator
  validator_model: glm-5.1
  codex_required: false
  codex_model: gpt-5.5
  max_roles_per_meeting: 7
  max_required_roles: 6
  quorum_minimum_ratio: 0.67  # 2/3 minimum for quorum

